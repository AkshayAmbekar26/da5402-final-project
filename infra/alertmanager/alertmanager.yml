global:
  resolve_timeout: 5m

route:
  receiver: demo-console
  group_by: ["alertname", "severity", "service"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:
  - name: demo-console
    webhook_configs:
      - url: http://api:8000/ops/alerts
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname", "service"]
