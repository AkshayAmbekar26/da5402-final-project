global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts-from@example.com"
  smtp_auth_username: "alerts-user@example.com"
  smtp_auth_password: "change-me"
  smtp_require_tls: true

route:
  receiver: email-and-demo-console
  group_by: ["alertname", "severity", "service"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:
  - name: email-and-demo-console
    webhook_configs:
      - url: http://api:8000/ops/alerts
        send_resolved: true
    email_configs:
      - to: "student@example.com"
        send_resolved: true
        headers:
          subject: "[DA5402][{{ .Status | toUpper }}][{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}"

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname", "service"]
